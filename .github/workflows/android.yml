name: Build Ahadu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repo structure
        run: |
          echo "=== ROOT ===" && ls -la
          echo "=== app/ ===" && ls -la app/ 2>/dev/null || echo "NO app/ FOLDER"
          echo "=== app/build.gradle ===" && cat app/build.gradle 2>/dev/null || echo "MISSING"
          echo "=== settings.gradle ===" && cat settings.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Install Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ahadu-Market-App
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
